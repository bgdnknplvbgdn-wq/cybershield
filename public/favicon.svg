  <path d="M32 14 L45 20.5 L45 33.5 C45 42 38.5 49 32 52.5 C25.5 49 19 42 19 33.5 L19 20.5 Z" fill="rgba(0,255,204,0.08)"/>
  <!-- KP text -->
